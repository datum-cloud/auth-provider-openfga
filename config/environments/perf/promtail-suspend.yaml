# Suspend the Promtail HelmRelease when the OTel Collector is deployed.
# The OTel Collector's filelog receiver replaces Promtail for log shipping.
#
# Apply with:
#   kubectl apply --server-side -f config/environments/perf/promtail-suspend.yaml \
#     --kubeconfig .test-infra/kubeconfig
#
# Revert with:
#   kubectl patch helmrelease promtail -n flux-system \
#     --type=merge -p '{"spec":{"suspend":false}}'
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: flux-system
spec:
  suspend: true
