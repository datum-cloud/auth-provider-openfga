apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openfga
  namespace: openfga-system
spec:
  dependsOn:
    - name: openfga-database
  timeout: 5m
  install:
    timeout: 5m
    remediation:
      retries: 10
  upgrade:
    timeout: 5m
    remediation:
      retries: 10
  values:
    datastore:
      engine: postgres
      # Dev/test only — plaintext credentials acceptable for ephemeral Kind clusters.
      # Do NOT use this pattern for non-ephemeral environments.
      uri: postgres://postgres:openfga@openfga-database-postgresql.openfga-system.svc.cluster.local:5432/openfga?sslmode=disable
      applyMigrations: true
      waitForMigrations: false
      migrationType: job
    checkQueryCache:
      enabled: true
      limit: 10000
      ttl: 10s
