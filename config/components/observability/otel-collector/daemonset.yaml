apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: telemetry-system
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/component: observability
    spec:
      serviceAccountName: otel-collector
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          # opentelemetry-collector-contrib includes the filelog, loki, and
          # spanmetrics components not present in the core distribution.
          image: otel/opentelemetry-collector-contrib:0.105.0
          args:
            - --config=/conf/config.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: tmpdir
              mountPath: /tmp
      tolerations:
        # Run on all nodes including control-plane for complete log coverage
        - operator: Exists
          effect: NoSchedule
      volumes:
        - name: config
          configMap:
            name: otel-collector
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: tmpdir
          emptyDir: {}
