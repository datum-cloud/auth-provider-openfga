apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: telemetry-system
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
spec:
  # ClusterIP so workloads in any namespace can reach the OTLP endpoints
  type: ClusterIP
  # Use None here would make it headless; keep regular ClusterIP so the
  # DNS name resolves to a stable virtual IP regardless of which DaemonSet
  # pod handles the connection.
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
