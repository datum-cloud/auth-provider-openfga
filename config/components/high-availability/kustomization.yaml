apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Production high-availability for the authz-webhook:
#   - Scales to 3 replicas (HPA manages from there)
#   - Spreads pods across nodes and zones
#   - PodDisruptionBudget to survive node drains
#   - HorizontalPodAutoscaler for load-based scaling

resources:
  - authz-webhook-pdb.yaml
  - authz-webhook-hpa.yaml

patches:
  - target:
      kind: Deployment
      name: authz-webhook
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: authz-webhook
                app.kubernetes.io/part-of: auth-provider-openfga
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: authz-webhook
                app.kubernetes.io/part-of: auth-provider-openfga
