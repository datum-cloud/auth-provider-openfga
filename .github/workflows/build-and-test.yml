name: Build and Test

on:
  push:
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: datum-cloud/${{ github.repository }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
      image-url: ${{ steps.summary.outputs.image-url }}
      build-time: ${{ steps.summary.outputs.build-time }}
      image-size: ${{ steps.summary.outputs.image-size }}
      build-summary: ${{ steps.summary.outputs.build-summary }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: image-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=ref,event=branch
            type=ref,event=branch,suffix=-{{commit_date 'YYYYMMDD-HHmmss'}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.image-meta.outputs.tags }}
          labels: ${{ steps.image-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate build summary
        id: summary
        run: |
          # Extract primary image tag
          PRIMARY_TAG=$(echo "${{ steps.image-meta.outputs.tags }}" | head -n1)
          echo "image-url=${PRIMARY_TAG}" >> $GITHUB_OUTPUT

          # Calculate build time (approximate)
          BUILD_TIME="${{ steps.build.outputs.duration || 'N/A' }}"
          echo "build-time=${BUILD_TIME}" >> $GITHUB_OUTPUT

          # Get image size
          docker pull $PRIMARY_TAG >/dev/null 2>&1 || true
          IMAGE_SIZE=$(docker images $PRIMARY_TAG --format "{{.Size}}" | head -n1 || echo "Unknown")
          echo "image-size=${IMAGE_SIZE}" >> $GITHUB_OUTPUT

          # Create comprehensive build summary
          BUILD_SUMMARY="**🏗️ Build Completed Successfully**

          📦 **Image**: \`${PRIMARY_TAG}\`
          🔒 **Digest**: \`${{ steps.build.outputs.digest }}\`
          📏 **Size**: ${IMAGE_SIZE}
          ⏱️ **Build Time**: ${BUILD_TIME}
          📅 **Built**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          🌿 **Branch**: ${{ github.ref_name }}
          📝 **Commit**: ${{ github.sha }}

          **All Generated Tags:**
          $(echo "${{ steps.image-meta.outputs.tags }}" | sed 's/^/- `/' | sed 's/$/`/')
          "

          # Save to output (escape newlines)
          echo "build-summary<<EOF" >> $GITHUB_OUTPUT
          echo "$BUILD_SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Also save to step summary
          echo "$BUILD_SUMMARY" >> $GITHUB_STEP_SUMMARY

  test-e2e:
    name: End-to-end testing
    runs-on: ubuntu-latest
    needs: build
    outputs:
      test-status: ${{ steps.test-summary.outputs.test-status }}
      tests-passed: ${{ steps.test-summary.outputs.tests-passed }}
      tests-failed: ${{ steps.test-summary.outputs.tests-failed }}
      test-duration: ${{ steps.test-summary.outputs.test-duration }}
      deployment-time: ${{ steps.test-summary.outputs.deployment-time }}
      cluster-info: ${{ steps.test-summary.outputs.cluster-info }}
      test-summary: ${{ steps.test-summary.outputs.test-summary }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kind
        run: |
          # For consistency with Makefile, we could check if kind is already available
          # but in CI it's clean every time, so we install it
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster and install Flux
        id: cluster-setup
        run: |
          echo "cluster-start-time=$(date +%s)" >> $GITHUB_OUTPUT
          make kind-create

      - name: Pull and load Docker image into kind
        run: |
          # Extract the image tag that was built in the previous job
          IMAGE_TAG=$(echo "${{ needs.build.outputs.image }}" | head -n1)
          echo "Pulling and loading image: $IMAGE_TAG"
          docker pull $IMAGE_TAG
          kind load docker-image $IMAGE_TAG --name auth-provider-openfga

          # Tag the image with the expected name for the deployment
          docker tag $IMAGE_TAG auth-provider-openfga:test
          kind load docker-image auth-provider-openfga:test --name auth-provider-openfga

      - name: Deploy infrastructure via Flux bootstrap
        id: deploy-infra
        run: |
          echo "deploy-start-time=$(date +%s)" >> $GITHUB_OUTPUT
          echo "📦 Deploying infrastructure (cert-manager, OpenFGA) via Flux..."
          make kustomize
          kubectl apply --server-side --wait=true -f <(bin/kustomize build config/bootstrap)
          echo "⏳ Waiting for infrastructure HelmReleases to be ready..."
          kubectl wait --for=condition=Ready helmrelease/cert-manager -n cert-manager --timeout=240s
          kubectl wait --for=condition=Ready helmrelease/cert-manager-csi-driver -n cert-manager --timeout=240s
          kubectl wait --for=condition=Ready helmrelease/openfga -n openfga-system --timeout=240s
          echo "✅ Infrastructure deployed successfully"

      - name: Create GitHub token secret for FluxCD
        run: |
          kubectl create secret generic github-token \
            --from-literal=username=git \
            --from-literal=password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=flux-system

      - name: Create FluxCD GitRepository
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: source.toolkit.fluxcd.io/v1
          kind: GitRepository
          metadata:
            name: auth-provider-openfga-source
            namespace: flux-system
          spec:
            interval: 30s
            ref:
              commit: ${{ github.event.pull_request.head.sha || github.sha }}
            url: https://github.com/${GITHUB_REPOSITORY}.git
            secretRef:
              name: github-token
          EOF

          # Wait for GitRepository to be ready
          kubectl wait --for=condition=Ready gitrepository/auth-provider-openfga-source -n flux-system --timeout=180s

      - name: Create FluxCD Kustomization for deployment
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: kustomize.toolkit.fluxcd.io/v1
          kind: Kustomization
          metadata:
            name: auth-provider-openfga
            namespace: flux-system
          spec:
            interval: 1m
            path: "./config/test-e2e"
            prune: true
            sourceRef:
              kind: GitRepository
              name: auth-provider-openfga-source
            timeout: 15m
            wait: true
            images:
              - name: auth-provider-openfga
                newName: auth-provider-openfga
                newTag: test
            healthChecks:
              # Cert-manager components (already deployed via bootstrap)
              - apiVersion: apps/v1
                kind: Deployment
                name: cert-manager
                namespace: cert-manager
              - apiVersion: apps/v1
                kind: Deployment
                name: cert-manager-webhook
                namespace: cert-manager
              - apiVersion: apps/v1
                kind: Deployment
                name: cert-manager-cainjector
                namespace: cert-manager
              # Certificates and ClusterIssuers
              - apiVersion: cert-manager.io/v1
                kind: Certificate
                name: auth-provider-openfga-auth-provider-openfga-ca-cert
                namespace: cert-manager
              - apiVersion: cert-manager.io/v1
                kind: ClusterIssuer
                name: auth-provider-openfga-selfsigned-cluster-issuer
              - apiVersion: cert-manager.io/v1
                kind: ClusterIssuer
                name: auth-provider-openfga-auth-provider-openfga-ca-cluster-issuer
              # Application components
              - apiVersion: apps/v1
                kind: Deployment
                name: auth-provider-openfga-controller-manager
                namespace: auth-provider-openfga-system
              - apiVersion: apps/v1
                kind: Deployment
                name: auth-provider-openfga-authz-webhook
                namespace: auth-provider-openfga-system
              # OpenFGA (already deployed via bootstrap)
              - apiVersion: apps/v1
                kind: Deployment
                name: openfga
                namespace: openfga-system
          EOF

      - name: Wait for FluxCD Kustomization to deploy and verify all components
        id: deploy-complete
        run: |
          echo "Waiting for FluxCD Kustomization to be ready (this includes all health checks)..."
          kubectl wait --for=condition=Ready kustomization/auth-provider-openfga -n flux-system --timeout=600s
          echo "All components are ready and healthy via FluxCD health checks!"
          echo "deploy-end-time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@v0.2.12
        with:
          release: v0.2.12

      - name: Run chainsaw tests with reporting
        id: run-tests
        run: |
          echo "test-start-time=$(date +%s)" >> $GITHUB_OUTPUT
          echo "Running chainsaw tests against the deployed system..."

          # Create reports directory
          mkdir -p reports

          # Run tests and capture both output and exit code with reporting enabled
          set +e  # Don't exit on error so we can capture the result
          chainsaw test test/ \
            --report-format JSON \
            --report-name chainsaw-test-report \
            --report-path reports \
            > chainsaw-output.log 2>&1
          CHAINSAW_EXIT_CODE=$?
          set -e  # Re-enable exit on error

          # Display the output for debugging
          echo "=== Chainsaw Test Output ==="
          cat chainsaw-output.log
          echo "=== End Chainsaw Output ==="

          # Determine test status based on exit code
          if [ $CHAINSAW_EXIT_CODE -eq 0 ]; then
            echo "test-status=passed" >> $GITHUB_OUTPUT
            echo "Tests completed successfully (exit code: $CHAINSAW_EXIT_CODE)"
          else
            echo "test-status=failed" >> $GITHUB_OUTPUT
            echo "Tests failed (exit code: $CHAINSAW_EXIT_CODE)"
          fi

          echo "test-end-time=$(date +%s)" >> $GITHUB_OUTPUT
          echo "chainsaw-exit-code=$CHAINSAW_EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Display Chainsaw Test Report
        if: always()
        run: |
          echo "=== Chainsaw Test Report ==="
          if [ -f reports/chainsaw-test-report.json ]; then
            echo "📊 **Chainsaw Test Report (JSON)**"
            echo '```json'
            cat reports/chainsaw-test-report.json | jq '.'
            echo '```'

            # Extract summary information from the report
            echo ""
            echo "📈 **Test Summary from Report:**"
            if command -v jq >/dev/null 2>&1; then
              TOTAL_TESTS=$(jq -r '.summary.testsCount // 0' reports/chainsaw-test-report.json 2>/dev/null || echo "N/A")
              PASSED_TESTS=$(jq -r '.summary.passedCount // 0' reports/chainsaw-test-report.json 2>/dev/null || echo "N/A")
              FAILED_TESTS=$(jq -r '.summary.failedCount // 0' reports/chainsaw-test-report.json 2>/dev/null || echo "N/A")
              SKIPPED_TESTS=$(jq -r '.summary.skippedCount // 0' reports/chainsaw-test-report.json 2>/dev/null || echo "N/A")

              echo "- **Total Tests**: $TOTAL_TESTS"
              echo "- **Passed**: $PASSED_TESTS"
              echo "- **Failed**: $FAILED_TESTS"
              echo "- **Skipped**: $SKIPPED_TESTS"

              # Store parsed values for use in summary
              echo "parsed-total-tests=$TOTAL_TESTS" >> $GITHUB_OUTPUT
              echo "parsed-passed-tests=$PASSED_TESTS" >> $GITHUB_OUTPUT
              echo "parsed-failed-tests=$FAILED_TESTS" >> $GITHUB_OUTPUT
            else
              echo "jq not available for parsing detailed report"
            fi
          else
            echo "❌ Chainsaw test report not found at reports/chainsaw-test-report.json"
            echo "Available files in reports directory:"
            ls -la reports/ || echo "Reports directory does not exist"
          fi

      - name: Generate comprehensive test summary
        id: test-summary
        if: always()
        run: |
          # Get timing values with fallbacks
          CLUSTER_START=${{ steps.cluster-setup.outputs.cluster-start-time || '0' }}
          DEPLOY_START=${{ steps.deploy-infra.outputs.deploy-start-time || '0' }}
          DEPLOY_END=${{ steps.deploy-complete.outputs.deploy-end-time || '0' }}
          TEST_START=${{ steps.run-tests.outputs.test-start-time || '0' }}
          TEST_END=${{ steps.run-tests.outputs.test-end-time || '0' }}

          # Calculate timing with validation
          if [ "$DEPLOY_END" -gt "$DEPLOY_START" ] && [ "$DEPLOY_START" -gt "0" ]; then
            DEPLOYMENT_TIME=$((DEPLOY_END - DEPLOY_START))
          else
            DEPLOYMENT_TIME="N/A"
          fi

          if [ "$TEST_END" -gt "$TEST_START" ] && [ "$TEST_START" -gt "0" ]; then
            TEST_DURATION=$((TEST_END - TEST_START))
          else
            TEST_DURATION="N/A"
          fi

          if [ "$TEST_END" -gt "$CLUSTER_START" ] && [ "$CLUSTER_START" -gt "0" ]; then
            TOTAL_TIME=$((TEST_END - CLUSTER_START))
          else
            TOTAL_TIME="N/A"
          fi

          echo "deployment-time=${DEPLOYMENT_TIME}" >> $GITHUB_OUTPUT
          echo "test-duration=${TEST_DURATION}" >> $GITHUB_OUTPUT

          # Get test status
          TEST_STATUS="${{ steps.run-tests.outputs.test-status || 'unknown' }}"
          echo "test-status=${TEST_STATUS}" >> $GITHUB_OUTPUT

          # Use parsed test results from chainsaw report if available
          PARSED_TOTAL="${{ steps.run-tests.outputs.parsed-total-tests || 'N/A' }}"
          PARSED_PASSED="${{ steps.run-tests.outputs.parsed-passed-tests || 'N/A' }}"
          PARSED_FAILED="${{ steps.run-tests.outputs.parsed-failed-tests || 'N/A' }}"

          if [ "$PARSED_TOTAL" != "N/A" ] && [ "$PARSED_PASSED" != "N/A" ]; then
            # Use parsed data from chainsaw JSON report
            TESTS_PASSED="$PARSED_PASSED"
            TESTS_FAILED="$PARSED_FAILED"
          else
            # Fallback to parsing chainsaw output log
            if [ -f chainsaw-output.log ]; then
              # Try to extract test counts from chainsaw output
              TESTS_PASSED=$(grep -oE '[0-9]+.*passed' chainsaw-output.log | head -1 | grep -oE '[0-9]+' || echo "N/A")
              TESTS_FAILED=$(grep -oE '[0-9]+.*failed' chainsaw-output.log | head -1 | grep -oE '[0-9]+' || echo "0")

              # If we can't parse specific numbers, use status-based fallback
              if [ "$TESTS_PASSED" = "N/A" ]; then
                if [ "$TEST_STATUS" = "passed" ]; then
                  TESTS_PASSED="All"
                  TESTS_FAILED="0"
                else
                  TESTS_PASSED="Some"
                  TESTS_FAILED="Some"
                fi
              fi
            else
              if [ "$TEST_STATUS" = "passed" ]; then
                TESTS_PASSED="All"
                TESTS_FAILED="0"
              else
                TESTS_PASSED="N/A"
                TESTS_FAILED="N/A"
              fi
            fi
          fi

          echo "tests-passed=${TESTS_PASSED}" >> $GITHUB_OUTPUT
          echo "tests-failed=${TESTS_FAILED}" >> $GITHUB_OUTPUT

          # Gather cluster information
          CLUSTER_INFO="**Kubernetes Version**: $(kubectl version --short --client 2>/dev/null | grep Client || echo 'Unknown')
          **Node Count**: $(kubectl get nodes --no-headers | wc -l)
          **Total Pods**: $(kubectl get pods --all-namespaces --no-headers | wc -l)
          **Namespaces**: $(kubectl get namespaces --no-headers | wc -l)"

          echo "cluster-info<<EOF" >> $GITHUB_OUTPUT
          echo "$CLUSTER_INFO" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Create comprehensive test summary
          if [ "$TEST_STATUS" = "passed" ]; then
            STATUS_ICON="✅"
            STATUS_COLOR="🟢"
          else
            STATUS_ICON="❌"
            STATUS_COLOR="🔴"
          fi

          # Extract primary image for display
          PRIMARY_IMAGE=$(echo "${{ needs.build.outputs.image }}" | head -n1)

          TEST_SUMMARY="**🧪 End-to-End Tests ${STATUS_ICON}**

          ${STATUS_COLOR} **Status**: ${TEST_STATUS}
          📊 **Results**: ${TESTS_PASSED} passed, ${TESTS_FAILED} failed
          ⏱️ **Test Duration**: ${TEST_DURATION}s
          🚀 **Deployment Time**: ${DEPLOYMENT_TIME}s
          ⏰ **Total Time**: ${TOTAL_TIME}s
          📦 **Tested Image**: \`${PRIMARY_IMAGE}\`
          🔒 **Image Digest**: \`${{ needs.build.outputs.digest }}\`

          **🎯 Components Tested:**
          - ✅ Auth Provider OpenFGA Controller Manager
          - ✅ Auth Provider OpenFGA AuthZ Webhook
          - ✅ OpenFGA Server
          - ✅ Cert-Manager Integration
          - ✅ FluxCD GitOps Deployment

          **🔧 Infrastructure:**
          $CLUSTER_INFO

          **📅 Test Run**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          "

          # Save to output (escape newlines)
          echo "test-summary<<EOF" >> $GITHUB_OUTPUT
          echo "$TEST_SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Also save to step summary
          echo "$TEST_SUMMARY" >> $GITHUB_STEP_SUMMARY

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Cluster Information ==="
          kubectl cluster-info
          echo "=== All Pods ==="
          kubectl get pods --all-namespaces
          echo "=== FluxCD Status ==="
          bin/flux get all
          echo "=== Kustomization Status ==="
          kubectl describe kustomization auth-provider-openfga -n flux-system
          echo "=== GitRepository Status ==="
          kubectl describe gitrepository auth-provider-openfga-source -n flux-system
          echo "=== HelmRelease Status ==="
          kubectl describe helmrelease cert-manager -n cert-manager
          kubectl describe helmrelease cert-manager-csi-driver -n cert-manager
          kubectl describe helmrelease openfga -n openfga-system
          echo "=== Events ==="
          kubectl get events --all-namespaces --sort-by='.lastTimestamp'
          echo "=== Built Image Info ==="
          echo "Image from build job: ${{ needs.build.outputs.image }}"
          echo "Image digest: ${{ needs.build.outputs.digest }}"
          echo "=== Chainsaw Test Output ==="
          if [ -f chainsaw-output.log ]; then
            cat chainsaw-output.log
          else
            echo "No chainsaw output log found"
          fi
          echo "=== Chainsaw Test Report ==="
          if [ -f reports/chainsaw-test-report.json ]; then
            echo "Chainsaw JSON Report:"
            cat reports/chainsaw-test-report.json | jq '.' || cat reports/chainsaw-test-report.json
          else
            echo "No chainsaw test report found"
            echo "Available files in reports directory:"
            ls -la reports/ 2>/dev/null || echo "Reports directory does not exist"
          fi
          echo "=== Logs from failing pods ==="
          for ns in auth-provider-openfga-system openfga-system cert-manager flux-system; do
            echo "--- Namespace: $ns ---"
            kubectl get pods -n $ns --field-selector=status.phase!=Running | tail -n +2 | while read pod rest; do
              if [ -n "$pod" ]; then
                echo "Logs for $pod in $ns:"
                kubectl logs $pod -n $ns --tail=50
              fi
            done
          done
